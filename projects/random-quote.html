<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Losowy cytat</title>
  <style>
    body { font-family: Arial, sans-serif; background: #fff9f0; color: #3b2f2f; margin: 0; padding: 20px; }
    .card { max-width: 620px; margin: 0 auto; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    button { background: #b45309; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; }
    button:hover { background: #92400e; }
    .quote { font-size: 18px; margin-top: 20px; line-height: 1.6; border-left: 4px solid #f59e0b; padding-left: 14px; }
    a { display: inline-block; margin-top: 18px; color: #b45309; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Losowy cytat</h1>
    <p>Kliknij, aby wyświetlić nowy cytat z listy.</p>
    <button id="new-quote">Pokaż cytat</button>
    <p class="quote" id="quote-text"></p>
    <a href="../index.html">⟵ Wróć do CV</a>
  </div>

  <script>
    const quotes = [
      'Najlepszy czas, aby posadzić drzewo, był 20 lat temu. Drugi najlepszy czas jest teraz.',
      'Życie to 10% tego, co się z tobą dzieje, i 90% tego, jak na to reagujesz.',
      'Nie czekaj. Czas nigdy nie będzie odpowiedni.',
      'Małe kroki codziennie prowadzą do wielkich rezultatów.',
      'Nauka to klucz, który otwiera wiele drzwi.'
    ];

    const button = document.getElementById('new-quote');
    const quoteText = document.getElementById('quote-text');

    button.addEventListener('click', () => {
      const random = quotes[Math.floor(Math.random() * quotes.length)];
      quoteText.textContent = random;
    });
  </script>
</body>
</html>
